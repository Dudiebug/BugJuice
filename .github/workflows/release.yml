name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            service -> target

      - name: Build LHM helper (.NET self-contained single-file)
        shell: pwsh
        run: |
          dotnet publish lhm-helper/lhm-helper.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output lhm-helper/publish
          Copy-Item lhm-helper/publish/bugjuice-lhm.exe src-tauri/bugjuice-lhm.exe -Force

      - name: Build bugjuice-svc (Rust service)
        shell: pwsh
        run: |
          cargo build --release --manifest-path service/Cargo.toml
          Copy-Item service/target/release/bugjuice-svc.exe src-tauri/bugjuice-svc.exe -Force

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app and publish prerelease
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BugJuice ${{ github.ref_name }}'
          releaseBody: |
            # BugJuice ${{ github.ref_name }} — Sessions view bugfix patch

            ## Fixes

            - **Stats regression.** `Average drain` and `Fastest discharge`
              summary cards now derive from the per-tick battery rate history
              using time-weighted averaging, so sessions that are still
              in-progress contribute correctly to the rolling 7-day window
              (previously they collapsed to `--`).
            - **Timeline hover.** Replaced Recharts' built-in `Tooltip` with a
              custom cursor overlay. You can now hover anywhere along the
              timeline — including inside interpolated (hatched) gaps and sleep
              bands that span the entire window — and see the date, time,
              battery percent, and discharge/charge rate (actual or estimated).
            - **Day view overlays.** Charging, sleep, and interpolated bands
              now paint correctly in the single-day view when the underlying
              session crosses midnight. Root cause was Recharts discarding
              `ReferenceArea`s that extended beyond the data-driven axis
              domain; the fix is an explicit window-bounds domain plus band
              clamping.
            - **Week view day dividers.** Added subtle dashed vertical
              dividers between days in the week view for readability.

            ## Download

            | Installer | For |
            |-----------|-----|
            | **BugJuice_1.0.1_x64-setup.exe** | Intel / AMD laptops |

            ## Upgrading

            The installer automatically stops and removes the existing
            BugJuice service before installing. Settings, history, and battery
            trend data are preserved.
          releaseDraft: false
          prerelease: true
